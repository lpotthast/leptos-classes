name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --locked

  check-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target wasm32-unknown-unknown --locked

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --locked -- -D warnings

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib --locked
      - run: cargo test --doc --locked

  browser-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            testing/test-app
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos,wasm-bindgen-cli
      - uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true
      - run: cargo test --test browser_test --locked -- --nocapture

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --release --locked

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --locked

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        shell: bash
        run: |
          set +e
          cargo audit
          status=$?

          if [ "$status" -ne 0 ]; then
            echo "::warning title=cargo audit::cargo audit failed with exit code $status"
            {
              echo "### cargo audit"
              echo ""
              echo "\`cargo audit\` failed with exit code \`$status\`."
              echo ""
              echo "See the job log for details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit 0

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        shell: bash
        run: |
          set +e
          cargo deny check
          status=$?

          if [ "$status" -ne 0 ]; then
            echo "::warning title=cargo deny::cargo deny check failed with exit code $status"
            {
              echo "### cargo deny"
              echo ""
              echo "\`cargo deny check\` failed with exit code \`$status\`."
              echo ""
              echo "See the job log for details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit 0

  semver-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: cargo semver-checks
        shell: bash
        run: |
          set +e
          cargo semver-checks
          status=$?

          if [ "$status" -ne 0 ]; then
            echo "::warning title=cargo semver-checks::cargo semver-checks failed with exit code $status"
            {
              echo "### cargo semver-checks"
              echo ""
              echo "\`cargo semver-checks\` failed with exit code \`$status\`."
              echo ""
              echo "See the job log for details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit 0
